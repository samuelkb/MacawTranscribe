{% load i18n static %}
<header class="sticky top-0 border-b border-(--color-border) bg-(--color-surface) px-5 py-3 shadow-(--shadow-sm) sm:h-[8vh] sm:py-0">
  <div class="mx-auto flex w-full max-w-(--container-max) flex-col items-center gap-3 px-5 sm:flex-row sm:justify-between sm:px-6 lg:px-8">
    <a href="/" class="topbar-brand">
        <span class="grid size-(--target-icon-size) shrink-0 place-items-center rounded-md border border-(--color-border) bg-(--color-surface) shadow-(--shadow-sm)">
          <img
            src="{% static 'images/macaw.png' %}"
            alt=""
            class="h-6 w-6"
          >
        </span>
      <span class="whitespace-nowrap font-display text-(length:--text-display-size)">Macaw Transcribe</span>
    </a>
    <nav aria-label="{% translate 'Primary navigation' %}" class="flex w-full items-center justify-center gap-(--target-gap-min) sm:w-auto sm:justify-end">
      <a href="/" class="topbar-nav-link">
        {% translate "Recordings" %}
      </a>
      <a href="/" class="topbar-nav-link">
        {% translate "Settings" %}
      </a>
    </nav>
  </div>
</header>
